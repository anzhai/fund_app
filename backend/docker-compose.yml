version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fund_app
      MYSQL_USER: fund_user
      MYSQL_PASSWORD: fund_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: mysql+pymysql://fund_user:fund_pass@mysql:3306/fund_app
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://fund_user:fund_pass@mysql:3306/fund_app
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy

  fund-service:
    build:
      context: ./fund-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://fund_user:fund_pass@mysql:3306/fund_app
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy

  portfolio-service:
    build:
      context: ./portfolio-service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://fund_user:fund_pass@mysql:3306/fund_app
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy

  trade-service:
    build:
      context: ./trade-service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: mysql+pymysql://fund_user:fund_pass@mysql:3306/fund_app
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - account-service
      - fund-service
      - portfolio-service
      - trade-service

volumes:
  mysql_data:
  redis_data:
