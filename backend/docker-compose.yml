version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fund_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"

  account-service:
    build: ./account-service
    ports:
      - "8002:8002"

  fund-service:
    build: ./fund-service
    ports:
      - "8003:8003"

  portfolio-service:
    build: ./portfolio-service
    ports:
      - "8004:8004"

  trade-service:
    build: ./trade-service
    ports:
      - "8005:8005"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - account-service
      - fund-service
      - portfolio-service
      - trade-service

volumes:
  mysql_data:
