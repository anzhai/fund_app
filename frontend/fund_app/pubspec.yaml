name: fund_app
description: A fund portfolio management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # HTTP Client
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^12.1.3

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Date/Time
  intl: ^0.18.1

  # Charts
  fl_chart: ^0.66.0

  # Image Picker (for ID card upload)
  image_picker: ^1.0.5

  # Biometric Authentication
  local_auth: ^2.1.7

  # Utils
  uuid: ^4.2.2
  crypto: ^3.0.3

  # Functional Programming
  dartz: ^0.10.1

  # Equatable for value comparison
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
